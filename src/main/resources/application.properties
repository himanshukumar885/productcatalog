spring.application.name=productcatalog

#H2 Database settings
spring.datasource.url=jdbc:h2:mem:productdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#show H2 console in browser
spring.h2.console.enable=true

#Auto create tables from our Entity classes
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in terminal
spring.jpa.show-sql=true
spring.h2console.path=/h2-console
